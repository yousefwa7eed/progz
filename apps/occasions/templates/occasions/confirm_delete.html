{% extends 'base.html' %}
{% block title %}حذف {{ occasion.name }}{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm mx-auto" style="max-width:500px;">
    <div class="card-body text-center p-5">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem;"></i>
        <h5 class="mt-3">تأكيد الحذف</h5>
        <p>هل أنت متأكد من حذف المناسبة <strong>{{ occasion.name }}</strong>؟</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> حذف</button>
            <a href="{% url 'occasion_detail' occasion.id %}" class="btn btn-outline-secondary">إلغاء</a>
        </form>
    </div>
</div>
{% endblock %}
