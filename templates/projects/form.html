{% extends 'base.html' %}

{% block title %}{% if form.instance.pk %}تعديل مشروع{% else %}مشروع جديد{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white"><h5 class="mb-0"><i class="bi bi-{% if form.instance.pk %}pencil{% else %}plus{% endif %}"></i> {% if form.instance.pk %}تعديل مشروع{% else %}مشروع جديد{% endif %}</h5></div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6 mb-3"><label class="form-label">اسم المشروع *</label><input type="text" name="name" class="form-control" value="{{ form.name.value|default:'' }}" required></div>
                        <div class="col-md-6 mb-3"><label class="form-label">النوع *</label>
                            <select name="project_type" class="form-select" required>
                                <option value="food" {% if form.project_type.value == 'food' %}selected{% endif %}>توزيع غذاء</option>
                                <option value="clothing" {% if form.project_type.value == 'clothing' %}selected{% endif %}>كسوة</option>
                                <option value="water" {% if form.project_type.value == 'water' %}selected{% endif %}>سقيا مياه</option>
                                <option value="medical" {% if form.project_type.value == 'medical' %}selected{% endif %}>دعم علاج</option>
                                <option value="renovation" {% if form.project_type.value == 'renovation' %}selected{% endif %}>ترميم</option>
                                <option value="educational" {% if form.project_type.value == 'educational' %}selected{% endif %}>تعليمي</option>
                                <option value="seasonal" {% if form.project_type.value == 'seasonal' %}selected{% endif %}>موسمي</option>
                            </select>
                        </div>
                        <div class="col-12 mb-3"><label class="form-label">الوصف *</label><textarea name="description" class="form-control" rows="3" required>{{ form.description.value|default:'' }}</textarea></div>
                        <div class="col-md-4 mb-3"><label class="form-label">الهدف المالي</label><input type="number" name="goal_amount" class="form-control" value="{{ form.goal_amount.value|default:'' }}" step="0.01"></div>
                        <div class="col-md-4 mb-3"><label class="form-label">الميزانية</label><input type="number" name="total_budget" class="form-control" value="{{ form.total_budget.value|default:0 }}" step="0.01"></div>
                        <div class="col-md-4 mb-3"><label class="form-label">عدد المستفيدين المستهدف</label><input type="number" name="beneficiaries_count" class="form-control" value="{{ form.beneficiaries_count.value|default:0 }}"></div>
                        <div class="col-md-4 mb-3"><label class="form-label">تاريخ البداية *</label><input type="date" name="start_date" class="form-control" value="{{ form.start_date.value|date:'Y-m-d'|default:'' }}" required></div>
                        <div class="col-md-4 mb-3"><label class="form-label">تاريخ النهاية</label><input type="date" name="end_date" class="form-control" value="{{ form.end_date.value|date:'Y-m-d'|default:'' }}"></div>
                        <div class="col-md-4 mb-3"><label class="form-label">مدير المشروع</label>
                            <select name="manager" class="form-select">
                                <option value="">-- اختر --</option>
                            </select>
                        </div>
                        <div class="col-12 mb-3"><label class="form-label">مواقع التنفيذ</label><input type="text" name="locations" class="form-control" value="{{ form.locations.value|default:'' }}"></div>
                        <div class="col-12 mb-3"><label class="form-label">ملاحظات</label><textarea name="notes" class="form-control" rows="2">{{ form.notes.value|default:'' }}</textarea></div>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> حفظ</button>
                    <a href="{% url 'project_list' %}" class="btn btn-secondary">إلغاء</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
