{% extends 'base.html' %}

{% block title %}قيد مالي جديد{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white"><h5 class="mb-0"><i class="bi bi-plus-lg"></i> قيد مالي جديد</h5></div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">نوع القيد *</label>
                            <select name="entry_type" class="form-select" required>
                                <option value="income">إيراد</option>
                                <option value="expense">مصروف</option>
                                <option value="transfer">تحويل</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">التاريخ *</label>
                            <input type="date" name="entry_date" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">المبلغ *</label>
                            <input type="number" name="amount" class="form-control" step="0.01" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">الحساب</label>
                            <select name="account" class="form-select">
                                <option value="">-- اختر --</option>
                                {% for a in form.account.field.queryset %}
                                <option value="{{ a.id }}">{{ a.code }} - {{ a.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">طريقة الدفع</label>
                            <select name="payment_method" class="form-select">
                                <option value="cash">نقداً</option>
                                <option value="transfer">تحويل بنكي</option>
                                <option value="card">بطاقة</option>
                                <option value="cheque">شيك</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">نوع المعاملة</label>
                            <select name="transaction_type" class="form-select">
                                <option value="general">عام</option>
                                <option value="zakat">زكاة</option>
                                <option value="sadaqah">صدقة</option>
                                <option value="project">مشروع</option>
                            </select>
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label">البيان *</label>
                            <textarea name="description" class="form-control" rows="2" required></textarea>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">رقم مرجعي</label>
                            <input type="text" name="reference_number" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">ملاحظات</label>
                            <input type="text" name="notes" class="form-control">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> حفظ</button>
                    <a href="{% url 'entry_list' %}" class="btn btn-secondary">إلغاء</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
