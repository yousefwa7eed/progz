{% extends 'base.html' %}

{% block title %}تغيير كلمة المرور{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-key"></i> تغيير كلمة المرور</h5>
            </div>
            <div class="card-body">
                <form method="post" id="changePasswordForm">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">كلمة المرور الحالية <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="password" name="old_password" class="form-control" required id="oldPassword">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('oldPassword', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">كلمة المرور الجديدة <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="password" name="new_password1" class="form-control" required id="newPassword"
                                   minlength="4" oninput="checkPasswordStrength(this.value)">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('newPassword', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <div class="mt-2">
                            <div class="progress" style="height: 6px;">
                                <div class="progress-bar" id="passwordStrength" role="progressbar" style="width: 0%"></div>
                            </div>
                            <small class="text-muted" id="strengthText">4 أحرف على الأقل</small>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">تأكيد كلمة المرور الجديدة <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="password" name="new_password2" class="form-control" required id="confirmPassword"
                                   oninput="checkPasswordMatch()">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirmPassword', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <small class="text-muted" id="matchText"></small>
                    </div>

                    <div class="alert alert-info small">
                        <i class="bi bi-info-circle"></i>
                        الحد الأدنى: 4 أحرف
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> حفظ</button>
                        <a href="{% url 'profile' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-right"></i> رجوع</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePassword(fieldId, btn) {
    const field = document.getElementById(fieldId);
    const icon = btn.querySelector('i');
    if (field.type === 'password') {
        field.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        field.type = 'password';
        icon.className = 'bi bi-eye';
    }
}

function checkPasswordStrength(password) {
    const bar = document.getElementById('passwordStrength');
    const text = document.getElementById('strengthText');
    let score = 0;
    if (password.length >= 4) score++;
    if (password.length >= 6) score++;
    if (/[A-Z]/.test(password) && /[a-z]/.test(password)) score++;
    if (/\d/.test(password)) score++;
    if (/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) score++;

    const levels = [
        { width: '20%', color: 'bg-danger', label: 'ضعيفة جداً' },
        { width: '40%', color: 'bg-warning', label: 'ضعيفة' },
        { width: '60%', color: 'bg-info', label: 'متوسطة' },
        { width: '80%', color: 'bg-primary', label: 'جيدة' },
        { width: '100%', color: 'bg-success', label: 'قوية' },
    ];
    const idx = Math.min(score, 4);
    bar.style.width = levels[idx].width;
    bar.className = 'progress-bar ' + levels[idx].color;
    text.textContent = password.length > 0 ? levels[idx].label : '4 أحرف على الأقل';
}

function checkPasswordMatch() {
    const newPass = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    const text = document.getElementById('matchText');
    if (confirm.length === 0) {
        text.textContent = '';
        text.className = 'text-muted';
    } else if (newPass === confirm) {
        text.textContent = '✓ كلمتا المرور متطابقتان';
        text.className = 'text-success';
    } else {
        text.textContent = '✗ كلمتا المرور غير متطابقتين';
        text.className = 'text-danger';
    }
}
</script>
{% endblock %}
