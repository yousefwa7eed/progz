{% extends 'base.html' %}

{% block title %}حركة مخزون جديدة{% endblock %}

{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
    <div class="card"><div class="card-header bg-primary text-white"><h5 class="mb-0"><i class="bi bi-arrow-left-right"></i> حركة مخزون جديدة</h5></div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3"><label class="form-label">الصنف *</label>
                <select name="item" class="form-select" required>
                    {% for i in form.item.field.queryset %}<option value="{{ i.id }}" {% if request.GET.item == i.id|stringformat:"s" %}selected{% endif %}>{{ i.code }} - {{ i.name }} ({{ i.quantity }} متوفر)</option>{% endfor %}
                </select>
            </div>
            <div class="mb-3"><label class="form-label">نوع الحركة *</label>
                <select name="transaction_type" class="form-select" required>
                    <option value="receive">استلام</option>
                    <option value="disburse">صرف</option>
                    <option value="return">مرتجع</option>
                    <option value="inventory">جرد</option>
                    <option value="transfer">تحويل</option>
                </select>
            </div>
            <div class="mb-3"><label class="form-label">الكمية *</label><input type="number" name="quantity" class="form-control" step="0.01" required></div>
            <div class="mb-3"><label class="form-label">سعر الوحدة</label><input type="number" name="unit_price" class="form-control" step="0.01"></div>
            <div class="mb-3"><label class="form-label">المصدر</label><input type="text" name="source" class="form-control"></div>
            <div class="mb-3"><label class="form-label">ملاحظات</label><textarea name="notes" class="form-control" rows="2"></textarea></div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> حفظ</button>
            <a href="{% url 'inventory_list' %}" class="btn btn-secondary">إلغاء</a>
        </form>
    </div></div>
</div></div>
{% endblock %}
